apiVersion: apps/v1
kind: Deployment

metadata:
  name: login-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: login-app

  template:

    metadata:
      labels:
        app: login-app

    spec:
      containers:

      - name: login-app

        image: login-app:v1

        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        env:
        - name: MONGO_URL
          value: mongodb://mongo-service:27017/loginDB